{{- if .Values.autoscaling.enabled }}
# Autoscaler — requires metrics-server. maxReplicas is capped at the
# logs-topic partition count (a Kafka consumer group cannot use more
# consumers than partitions). Lag-based scaling (KEDA) would be better —
# see infra/k8s/README.md.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingestion
  labels:
    app: ingestion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingestion
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
