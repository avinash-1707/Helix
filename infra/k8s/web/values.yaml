replicaCount: 2

image:
  # Push the apps/web image here (e.g. ECR). Tag per release.
  repository: helix/web
  tag: "0.0.0"
  pullPolicy: IfNotPresent

service:
  port: 3000

config:
  # Server-side gateway URL — the browser never sees it (lib/server.ts).
  helixApiUrl: http://api:3001

ingress:
  enabled: true
  className: traefik
  host: helix.example.com
  tls:
    enabled: true
    # cert-manager ClusterIssuer that signs the TLS cert (Let's Encrypt).
    clusterIssuer: letsencrypt-prod

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
