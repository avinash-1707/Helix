# Secret config: the DB connection string (carries the password) and the
# provider API keys. Provider keys are optional — config.ts treats an
# unset key as "provider not selectable", not a startup error.
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  labels:
    app: api
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- with .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.googleApiKey }}
  GOOGLE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.openrouterApiKey }}
  OPENROUTER_API_KEY: {{ . | quote }}
  {{- end }}
