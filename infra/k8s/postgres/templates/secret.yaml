# Postgres credentials. Consumed by the StatefulSet and referenced by the
# api/ingestion charts (which build their own DATABASE_URL).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-auth
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.auth.password | quote }}
  POSTGRES_DB: {{ .Values.auth.database | quote }}
