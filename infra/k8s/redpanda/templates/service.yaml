# Headless Service — stable DNS `redpanda` for the Kafka clients (api SDK
# emitter, ingestion consumer) and the topic-init job.
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  labels:
    app: redpanda
spec:
  clusterIP: None
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: admin
      port: 9644
      targetPort: 9644
