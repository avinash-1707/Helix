# Auto-provisioned dashboard provider. Grafana loads every dashboard JSON
# under /var/lib/grafana/dashboards (infra/grafana/dashboards is mounted
# there). Dashboard JSON exports land in that dir in a later phase.
apiVersion: 1

providers:
  - name: helix
    orgId: 1
    folder: Helix
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
