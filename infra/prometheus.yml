# Prometheus scrape config for the local Helix stack.
# Both services expose prom-client metrics at /metrics (default path).
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: helix-api
    static_configs:
      - targets: ["api:3001"]
        labels:
          service: api

  - job_name: helix-ingestion
    static_configs:
      - targets: ["ingestion:3002"]
        labels:
          service: ingestion

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
